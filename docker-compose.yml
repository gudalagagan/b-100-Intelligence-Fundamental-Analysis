version: "3.9"

services:

  # ── PostgreSQL Data Warehouse ──────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bluestock_postgres
    environment:
      POSTGRES_DB: bluestock_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./etl/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bluestock_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django Web App ─────────────────────────────────────
  web:
    build: ./django_app
    container_name: bluestock_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./django_app:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bluestock_dw
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
      - SECRET_KEY=docker-dev-secret-key
      - ALLOWED_HOSTS=*
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker (background tasks) ──────────────────
  celery:
    build: ./django_app
    container_name: bluestock_celery
    command: celery -A bluestock worker -l info
    volumes:
      - ./django_app:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bluestock_dw
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
      - SECRET_KEY=docker-dev-secret-key
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
